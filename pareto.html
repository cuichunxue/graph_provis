<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro-Vis | パレート図</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg: #0f1117;
  --c-surface: #1a1d27;
  --c-surface-alt: #232733;
  --c-border: #2e3346;
  --c-text: #e4e6f0;
  --c-text-secondary: #8b8fa4;
  --c-primary: #5b8def;
  --c-primary-light: rgba(91,141,239,0.15);
  --c-accent: #3b82f6;
  --bar-fill: #00d4aa;
  --bar-stroke: #00b894;
  --line-color: #f59e0b;
  --c-error: #ef4444;
  --c-warning: #f59e0b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
}

.app-header {
  background: linear-gradient(135deg, #141825 0%, #1a1d27 100%);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.provis-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.provis-logo-icon {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; letter-spacing: 0.03em; color: #fff;
}
.provis-logo-title { font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
.app-nav { display: flex; gap: 2px; flex: 1; }
.nav-tab {
  padding: 5px 13px; border-radius: 6px; font-size: 0.8rem;
  font-weight: 500; color: #9498ab; text-decoration: none;
  transition: 0.2s; white-space: nowrap;
}
.nav-tab:hover { background: #1e2230; color: #e4e6f0; }
.nav-tab.active { background: var(--c-primary-light); color: var(--c-primary); }
.header-actions { display: flex; gap: 8px; }
.header-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff; padding: 7px 16px; border-radius: 6px;
  font-size: 0.82rem; cursor: pointer; transition: 0.2s;
  font-family: inherit; white-space: nowrap;
}
.header-btn:hover { background: rgba(255,255,255,0.25); }

.main-layout {
  display: flex;
  gap: 0;
  max-width: 1440px;
  margin: 0 auto;
  min-height: calc(100vh - 100px);
}

.panel-left {
  width: 380px;
  min-width: 380px;
  border-right: 1px solid var(--c-border);
  padding: 20px;
  overflow-y: auto;
  max-height: calc(100vh - 100px);
}

.panel-right {
  flex: 1;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  max-height: calc(100vh - 100px);
}

.section-label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--c-primary);
  margin-bottom: 10px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 12px;
}

.data-table th {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--c-text-secondary);
  text-align: left;
  padding: 6px 8px;
  border-bottom: 1px solid var(--c-border);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.data-table th:nth-child(1) { width: 28px; }
.data-table th:nth-child(2) { }
.data-table th:nth-child(3) { width: 90px; }
.data-table th:nth-child(4) { width: 36px; }

.data-table td {
  padding: 3px 4px;
  vertical-align: middle;
}

.data-table tr {
  border-bottom: 1px solid rgba(46,51,70,0.5);
}

.data-table .row-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--c-text-secondary);
  text-align: center;
}

.data-table input[type="text"],
.data-table input[type="number"] {
  width: 100%;
  background: var(--c-surface-alt);
  border: 1px solid var(--c-border);
  border-radius: 5px;
  padding: 7px 9px;
  color: var(--c-text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.data-table input:focus {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 2px var(--c-primary-light);
}

.data-table input[type="number"] {
  font-family: 'JetBrains Mono', monospace;
  text-align: right;
}

.data-table input.error {
  border-color: var(--c-error);
  box-shadow: 0 0 0 2px rgba(239,68,68,0.15);
}

.btn-row-delete {
  background: none;
  border: none;
  color: var(--c-text-secondary);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  font-size: 1rem;
  line-height: 1;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-row-delete:hover {
  color: var(--c-error);
  background: rgba(239,68,68,0.1);
}

.btn-group {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.btn {
  padding: 8px 14px;
  border-radius: 6px;
  border: 1px solid var(--c-border);
  background: var(--c-surface-alt);
  color: var(--c-text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.btn:hover {
  background: var(--c-border);
}

.btn-primary {
  background: var(--c-primary);
  color: #fff;
  border-color: var(--c-primary);
  font-weight: 600;
}

.btn-primary:hover {
  background: #4a78d4;
}

.btn-danger {
  color: var(--c-error);
}

.btn-danger:hover {
  background: rgba(239,68,68,0.12);
}

.settings-group {
  margin-bottom: 18px;
}

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.setting-row label {
  font-size: 0.8rem;
  color: var(--c-text-secondary);
}

.setting-row input[type="text"],
.setting-row input[type="number"],
.setting-row select {
  width: 160px;
  background: var(--c-surface-alt);
  border: 1px solid var(--c-border);
  border-radius: 5px;
  padding: 6px 9px;
  color: var(--c-text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  outline: none;
}

.setting-row input:focus,
.setting-row select:focus {
  border-color: var(--c-primary);
}

.setting-row select {
  cursor: pointer;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.checkbox-row input[type="checkbox"] {
  accent-color: var(--c-primary);
  width: 15px;
  height: 15px;
}

.checkbox-row label {
  font-size: 0.8rem;
  color: var(--c-text-secondary);
  cursor: pointer;
}

.divider {
  border: none;
  border-top: 1px solid var(--c-border);
  margin: 16px 0;
}

/* Chart Container */
.chart-wrapper {
  width: 100%;
  max-width: 900px;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: 10px;
  padding: 24px;
  position: relative;
}

.chart-title {
  text-align: center;
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--c-text);
}

.chart-area {
  position: relative;
  width: 100%;
}

.chart-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 400px;
  color: var(--c-text-secondary);
  gap: 10px;
}
.chart-placeholder .ph-icon { opacity: 0.25; display:flex; align-items:center; justify-content:center; }
.chart-placeholder .ph-text { font-size: 0.95rem; font-weight: 500; }
.chart-placeholder .ph-sub { font-size: 0.78rem; color: var(--c-text-hint, #636882); }

svg.pareto-svg {
  width: 100%;
  height: auto;
  display: block;
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: #232733;
  border: 1px solid var(--c-border);
  border-radius: 7px;
  padding: 10px 14px;
  font-size: 0.82rem;
  pointer-events: none;
  z-index: 999;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 220px;
}

.tooltip.show { opacity: 1; }

.tooltip .tt-label {
  font-weight: 600;
  color: var(--c-primary);
  margin-bottom: 4px;
}

.tooltip .tt-row {
  color: var(--c-text-secondary);
  font-size: 0.78rem;
  line-height: 1.5;
}

.tooltip .tt-row span {
  color: var(--c-text);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
}

/* Sample data banner */
.sample-banner {
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.25);
  border-radius: 7px;
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 0.78rem;
  color: var(--c-warning);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sample-banner .icon { display:flex; align-items:center; flex-shrink:0; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 16px;
  width: 100%;
  max-width: 900px;
}

.stat-card {
  flex: 1;
  min-width: 120px;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: 8px;
  padding: 12px 14px;
}

.stat-card .stat-label {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--c-text-secondary);
  margin-bottom: 4px;
}

.stat-card .stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--c-primary);
}

/* Responsive */
@media (max-width: 900px) {
  .main-layout {
    flex-direction: column;
  }
  .panel-left {
    width: 100%;
    min-width: 0;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--c-border);
  }
  .panel-right {
    max-height: none;
  }
}

@media (max-width: 600px) {
  .app-header { padding: 10px 12px; gap: 10px; }
  .provis-logo-title { display: none; }
  .app-nav { overflow-x: auto; scrollbar-width: none; }
  .app-nav::-webkit-scrollbar { display: none; }
  .nav-tab { padding: 5px 8px; font-size: 0.74rem; }
  .header-btn { padding: 6px 10px; font-size: 0.76rem; }
  .panel-left { padding: 12px; }
}

/* Color picker display */
.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 5px;
  border: 1px solid var(--c-border);
  cursor: pointer;
  padding: 0;
  overflow: hidden;
}

.color-swatch input[type="color"] {
  width: 40px;
  height: 40px;
  border: none;
  padding: 0;
  cursor: pointer;
  transform: translate(-6px, -6px);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3e4460; }

/* Import Modal */
.import-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.65);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.import-modal-content {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 560px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}

.import-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.import-modal-header h3 {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--c-text);
}

.import-desc {
  font-size: 0.78rem;
  color: var(--c-text-secondary);
  line-height: 1.6;
  margin-bottom: 12px;
}

.import-desc code {
  background: var(--c-surface-alt);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--c-primary);
}

#importTextarea {
  width: 100%;
  min-height: 200px;
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  border-radius: 7px;
  padding: 12px;
  color: var(--c-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.5;
  resize: vertical;
  outline: none;
}

#importTextarea:focus {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 2px var(--c-primary-light);
}

#importTextarea::placeholder {
  color: #555;
}

.import-modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 14px;
}

/* Animation for bars */
@keyframes barGrow {
  from { transform: scaleY(0); }
  to { transform: scaleY(1); }
}

.highlight-80 {
  fill: rgba(245,158,11,0.08);
}
</style>
</head>
<body>

<header class="app-header">
  <a href="dashboard.html" class="provis-logo">
    <div class="provis-logo-icon">PV</div>
    <span class="provis-logo-title">Pro-Vis</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-tab">ホーム</a>
    <a href="graph_provis.html" class="nav-tab">グラフ</a>
    <a href="histgram.html" class="nav-tab">ヒストグラム</a>
    <a href="pareto.html" class="nav-tab active">パレート</a>
    <a href="scatter_regression_app.html" class="nav-tab">散布図</a>
  </nav>
  <div class="header-actions">
    <button class="header-btn" onclick="exportSVG()">SVG保存</button>
    <button class="header-btn" onclick="exportPNG()">PNG保存</button>
    <button class="header-btn" onclick="exportCSV()">CSV保存</button>
  </div>
</header>

<div class="main-layout">
  <div class="panel-left">
    <!-- Data Input Section -->
    <div class="section-label">データ入力</div>
    
    <div class="sample-banner" id="sampleBanner">
      <span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
      <span>サンプルデータが入っています。自由に編集してください。</span>
    </div>

    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th>#</th>
          <th>項目名</th>
          <th>値</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="dataBody">
      </tbody>
    </table>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="addRow()">＋ 行追加</button>
      <button class="btn btn-danger" onclick="clearAll()">全削除</button>
    </div>

    <hr class="divider">

    <!-- Settings -->
    <div class="section-label">グラフ設定</div>
    
    <div class="settings-group">
      <div class="setting-row">
        <label>グラフタイトル</label>
        <input type="text" id="chartTitle" value="パレート図" oninput="renderChart()">
      </div>
      <div class="setting-row">
        <label>Y軸ラベル (左)</label>
        <input type="text" id="yLabelLeft" value="件数" oninput="renderChart()">
      </div>
      <div class="setting-row">
        <label>X軸ラベル</label>
        <input type="text" id="xLabel" value="" oninput="renderChart()">
      </div>
    </div>

    <div class="settings-group">
      <div class="setting-row">
        <label>棒グラフ色</label>
        <div class="color-swatch">
          <input type="color" id="barColor" value="#00d4aa" oninput="renderChart()">
        </div>
      </div>
      <div class="setting-row">
        <label>累積線色</label>
        <div class="color-swatch">
          <input type="color" id="lineColor" value="#f59e0b" oninput="renderChart()">
        </div>
      </div>
    </div>

    <div class="settings-group">
      <div class="checkbox-row">
        <input type="checkbox" id="showOther" checked onchange="renderChart()">
        <label for="showOther">「その他」を自動集約</label>
      </div>
      <div class="setting-row" id="otherThresholdRow">
        <label>集約閾値 (項目数)</label>
        <input type="number" id="otherThreshold" value="0" min="0" step="1" oninput="renderChart()" title="0=集約しない。N>0の場合、上位N項目以外を「その他」にまとめます">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="show80line" checked onchange="renderChart()">
        <label for="show80line">80%ラインを表示</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="showValues" checked onchange="renderChart()">
        <label for="showValues">棒グラフに値を表示</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="showCumPercent" checked onchange="renderChart()">
        <label for="showCumPercent">累積%を表示</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="showGrid" checked onchange="renderChart()">
        <label for="showGrid">グリッド線を表示</label>
      </div>
    </div>

    <hr class="divider">
    <div class="section-label">インポート</div>
    <div class="btn-group">
      <button class="btn" onclick="importCSV()">データ貼り付け</button>
      <button class="btn" onclick="loadSample()">サンプル復元</button>
    </div>
  </div>

  <div class="panel-right">
    <div class="chart-wrapper">
      <div class="chart-area" id="chartArea">
        <div class="chart-placeholder" id="chartPlaceholder" style="display:none;">
          <div class="ph-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="4" height="14"/><rect x="8" y="11" width="4" height="10"/><rect x="14" y="15" width="4" height="6"/><polyline points="4 7 10 11 16 15" stroke-dasharray="3 2"/><line x1="0" y1="21" x2="24" y2="21"/></svg></div>
          <div class="ph-text">データを入力してください</div>
          <div class="ph-sub">左パネルで項目と値を入力するとパレート図が描画されます</div>
        </div>
        <svg class="pareto-svg" id="paretoSvg"></svg>
      </div>
    </div>
    
    <div class="stats-bar" id="statsBar"></div>

  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<!-- Import Modal -->
<div class="import-modal" id="importModal">
  <div class="import-modal-content">
    <div class="import-modal-header">
      <h3>データ貼り付け</h3>
      <button class="btn-row-delete" onclick="closeImportModal()" style="font-size:1.2rem;">✕</button>
    </div>
    <p class="import-desc">Excel・スプレッドシート・テキストからデータを貼り付けてください。<br>
    形式: <code>項目名, 値</code> または <code>項目名 &lt;TAB&gt; 値</code>（1行1項目）<br>
    ヘッダー行は自動でスキップされます。「その他/其の他/そのた」は自動的に最後に配置されます。</p>
    <textarea id="importTextarea" placeholder="例:&#10;不良A&#9;45&#10;不良B&#9;30&#10;不良C&#9;15&#10;その他&#9;5&#10;&#10;※ Excelから直接コピー＆ペーストもOK"></textarea>
    <div class="import-modal-actions">
      <button class="btn" onclick="closeImportModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="executeImport()">インポート</button>
    </div>
  </div>
</div>

<script>
if (window.self !== window.top) {
    document.querySelector('.provis-logo').style.display = 'none';
    document.querySelector('.app-nav').style.display = 'none';
    document.querySelector('.header-actions').style.marginLeft = 'auto';
}
// ============================
// State
// ============================
let dataRows = [];
let rowIdCounter = 0;

const SAMPLE_DATA = [
  { name: '不良A', value: 45 },
  { name: '不良B', value: 30 },
  { name: '不良C', value: 15 },
  { name: '不良D', value: 7 },
  { name: 'その他', value: 3 },
];

// ============================
// Data Management
// ============================
function generateId() { return ++rowIdCounter; }

function addRow(name = '', value = '') {
  dataRows.push({ id: generateId(), name, value });
  rebuildTable();
  renderChart();
  // Focus on the new name input
  setTimeout(() => {
    const inputs = document.querySelectorAll('#dataBody input[data-field="name"]');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 30);
}

function removeRow(id) {
  dataRows = dataRows.filter(r => r.id !== id);
  rebuildTable();
  renderChart();
}

function clearAll() {
  if (dataRows.length === 0) return;
  if (!confirm('全データを削除しますか？')) return;
  dataRows = [];
  rebuildTable();
  renderChart();
  document.getElementById('sampleBanner').style.display = 'none';
}

function updateRow(id, field, val) {
  const row = dataRows.find(r => r.id === id);
  if (row) {
    row[field] = val;
    renderChart();
  }
}

function loadSample() {
  dataRows = SAMPLE_DATA.map(d => ({ id: generateId(), name: d.name, value: d.value }));
  rebuildTable();
  renderChart();
  document.getElementById('sampleBanner').style.display = 'flex';
}

function importCSV() {
  // Show modal
  document.getElementById('importModal').style.display = 'flex';
  const ta = document.getElementById('importTextarea');
  ta.value = '';
  setTimeout(() => ta.focus(), 50);
}

function closeImportModal() {
  document.getElementById('importModal').style.display = 'none';
}

function executeImport() {
  const raw = document.getElementById('importTextarea').value;
  if (!raw.trim()) { alert('データを貼り付けてください。'); return; }

  const lines = raw.trim().split('\n');
  const newRows = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    // Detect delimiter: tab, comma, or multi-space
    let parts;
    if (line.includes('\t')) {
      parts = line.split('\t');
    } else if (line.includes(',')) {
      parts = line.split(',');
    } else {
      parts = line.split(/\s{2,}/);
    }

    if (parts.length < 2) continue;

    const col0 = parts[0].trim();
    const col1 = parts[1].trim();

    // Skip header rows: if 2nd column is not a number, it's likely a header
    const numVal = parseFloat(col1);
    if (isNaN(numVal)) continue;

    const name = col0;
    if (!name) continue;
    if (numVal < 0) continue;

    newRows.push({ id: generateId(), name, value: numVal });
  }

  if (newRows.length > 0) {
    dataRows = newRows;
    rebuildTable();
    renderChart();
    document.getElementById('sampleBanner').style.display = 'none';
    closeImportModal();
  } else {
    alert('有効なデータが見つかりませんでした。\n形式: 項目名,値 または 項目名<TAB>値');
  }
}

// ============================
// Table Rendering
// ============================
function rebuildTable() {
  const tbody = document.getElementById('dataBody');
  tbody.innerHTML = '';
  dataRows.forEach((row, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="row-num">${idx + 1}</td>
      <td><input type="text" data-field="name" value="${escHtml(String(row.name))}" placeholder="項目名"></td>
      <td><input type="number" data-field="value" value="${row.value}" min="0" step="any" placeholder="0"></td>
      <td><button class="btn-row-delete" title="削除">✕</button></td>
    `;
    const nameInput = tr.querySelector('[data-field="name"]');
    const valInput = tr.querySelector('[data-field="value"]');
    nameInput.addEventListener('input', e => updateRow(row.id, 'name', e.target.value));
    valInput.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      if (e.target.value === '' || isNaN(v) || v < 0) {
        e.target.classList.add('error');
        updateRow(row.id, 'value', '');
      } else {
        e.target.classList.remove('error');
        updateRow(row.id, 'value', v);
      }
    });
    // Enter key to add next row
    valInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addRow(); }
    });
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); valInput.focus(); }
    });
    tr.querySelector('.btn-row-delete').addEventListener('click', () => removeRow(row.id));
    tbody.appendChild(tr);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================
// Pareto Chart Logic (STRICT RULES)
// ============================
// Pareto rules:
// 1. Bars sorted descending by value
// 2. "その他" always last
// 3. Cumulative percentage line starts at 0% at left edge
// 4. Cumulative line point at the right edge of each bar
// 5. Right Y-axis: 0% to 100%
// 6. Left Y-axis: 0 to total (or nice max)
// 7. 80% line optional

// 「その他」系の項目名かどうか判定
function isOtherCategory(name) {
  const n = name.trim();
  const patterns = [
    'その他', 'そのた', 'そのほか', 'ソノタ', 'ソノホカ',
    '其の他', '其他', 'その他計',
    'other', 'others', 'etc', 'misc',
  ];
  const lower = n.toLowerCase();
  return patterns.some(p => lower === p || lower === p + '.');
}

function computeParetoData() {
  // Filter valid rows
  let valid = dataRows.filter(r => r.name && r.value !== '' && !isNaN(r.value) && r.value >= 0);
  if (valid.length === 0) return null;

  // Separate "その他" items from normal items
  const normalItems = valid.filter(r => !isOtherCategory(r.name));
  const otherItems = valid.filter(r => isOtherCategory(r.name));

  // Sort normal items descending by value
  normalItems.sort((a, b) => b.value - a.value);

  let items = normalItems.map(r => ({ name: r.name, value: r.value }));

  // "その他" aggregation by threshold
  const showOther = document.getElementById('showOther').checked;
  const threshold = parseInt(document.getElementById('otherThreshold').value) || 0;

  if (showOther && threshold > 0 && items.length > threshold) {
    const top = items.slice(0, threshold);
    const rest = items.slice(threshold);
    const restVal = rest.reduce((s, r) => s + r.value, 0);
    const origOtherVal = otherItems.reduce((s, r) => s + r.value, 0);
    items = [...top, { name: 'その他', value: restVal + origOtherVal }];
  } else if (otherItems.length > 0) {
    // Append original "その他" items merged into one, always at the end
    const otherVal = otherItems.reduce((s, r) => s + r.value, 0);
    const otherName = otherItems.length === 1 ? otherItems[0].name : 'その他';
    items.push({ name: otherName, value: otherVal });
  }

  // Compute cumulative
  const total = items.reduce((s, r) => s + r.value, 0);
  if (total === 0) return null;

  let cum = 0;
  const data = items.map((item, i) => {
    cum += item.value;
    return {
      name: item.name,
      value: item.value,
      percentage: (item.value / total * 100),
      cumulative: cum,
      cumulativePercent: (cum / total * 100),
    };
  });

  return { items: data, total };
}

// ============================
// Chart Rendering (SVG)
// ============================
function renderChart() {
  const svg = document.getElementById('paretoSvg');
  const result = computeParetoData();
  
  if (!result) {
    svg.innerHTML = '';
    svg.style.display = 'none';
    document.getElementById('chartPlaceholder').style.display = 'flex';
    document.getElementById('statsBar').innerHTML = '';
    return;
  }
  document.getElementById('chartPlaceholder').style.display = 'none';
  svg.style.display = 'block';

  const { items, total } = result;
  const n = items.length;

  // Settings
  const barColor = document.getElementById('barColor').value;
  const lineColor = document.getElementById('lineColor').value;
  const show80 = document.getElementById('show80line').checked;
  const showVals = document.getElementById('showValues').checked;
  const showCumP = document.getElementById('showCumPercent').checked;
  const showGrid = document.getElementById('showGrid').checked;
  const titleText = document.getElementById('chartTitle').value || '';
  const yLabelL = document.getElementById('yLabelLeft').value || '';
  const xLabelText = document.getElementById('xLabel').value || '';

  // Chart dimensions
  const W = 820, H = 460;
  const margin = { top: 48, right: 64, bottom: 70, left: 64 };
  const cw = W - margin.left - margin.right;
  const ch = H - margin.top - margin.bottom;

  // Y axis max (left) — exactly equal to total
  const maxVal = total;
  
  // Bar geometry
  const barGap = Math.max(2, Math.min(8, cw / n * 0.08));
  const barW = (cw - barGap * (n - 1)) / n;

  let svgContent = '';
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Background
  svgContent += `<rect width="${W}" height="${H}" fill="transparent"/>`;

  // Chart group
  svgContent += `<g transform="translate(${margin.left},${margin.top})">`;

  // Grid lines
  if (showGrid) {
    const ticks = niceTicksForMax(maxVal);
    for (const t of ticks) {
      const y = ch - (t / maxVal) * ch;
      svgContent += `<line x1="0" y1="${y}" x2="${cw}" y2="${y}" stroke="#2e3346" stroke-width="0.7" stroke-dasharray="3,3"/>`;
    }
  }

  // 80% highlight zone
  if (show80) {
    const y80 = ch - (0.8 * total / maxVal) * ch;
    // Horizontal 80% line
    svgContent += `<line x1="0" y1="${ch - (0.8) * ch}" x2="${cw}" y2="${ch - (0.8) * ch}" stroke="${lineColor}" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.6"/>`;
    svgContent += `<text x="${cw + 4}" y="${ch - 0.8 * ch + 4}" fill="${lineColor}" font-size="10" font-family="JetBrains Mono" opacity="0.8">80%</text>`;
  }

  // Bars
  items.forEach((item, i) => {
    const x = i * (barW + barGap);
    const barH = (item.value / maxVal) * ch;
    const y = ch - barH;

    svgContent += `<rect class="bar-rect" data-index="${i}" x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${barColor}" opacity="0.85" rx="2" ry="2" style="cursor:pointer; transition: opacity 0.15s;"/>`;
    svgContent += `<rect data-index="${i}" x="${x}" y="${y}" width="${barW}" height="${barH}" fill="transparent" stroke="${barColor}" stroke-width="1.2" rx="2" ry="2" style="cursor:pointer;"/>`;

    // Value label on bar
    if (showVals && barH > 18) {
      svgContent += `<text x="${x + barW / 2}" y="${y + barH / 2 + 4}" text-anchor="middle" fill="#fff" font-size="${Math.min(12, barW * 0.35)}" font-family="JetBrains Mono" font-weight="500" pointer-events="none">${formatNum(item.value)}</text>`;
    } else if (showVals) {
      svgContent += `<text x="${x + barW / 2}" y="${y - 5}" text-anchor="middle" fill="${barColor}" font-size="${Math.min(11, barW * 0.3)}" font-family="JetBrains Mono" font-weight="500" pointer-events="none">${formatNum(item.value)}</text>`;
    }

    // X axis label
    const labelMaxLen = Math.max(3, Math.floor(barW / 9));
    let label = item.name.length > labelMaxLen ? item.name.slice(0, labelMaxLen) + '…' : item.name;
    svgContent += `<text x="${x + barW / 2}" y="${ch + 18}" text-anchor="middle" fill="#8b8fa4" font-size="${Math.min(12, barW * 0.32)}" font-family="Noto Sans JP">${escSvg(label)}</text>`;
  });

  // Cumulative line — starts at left edge (0%), points at right edge of each bar
  const linePoints = [];
  // Start point at 0,0%
  linePoints.push({ x: 0, y: ch });
  items.forEach((item, i) => {
    const x = i * (barW + barGap) + barW; // right edge of bar
    const y = ch - (item.cumulativePercent / 100) * ch;
    linePoints.push({ x, y });
  });

  // Draw line
  let pathD = linePoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  svgContent += `<path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Dots and cumulative % labels
  linePoints.forEach((p, i) => {
    if (i === 0) return; // skip origin
    svgContent += `<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="${lineColor}" stroke="#1a1d27" stroke-width="2" style="cursor:pointer;" data-cum-index="${i - 1}"/>`;
    if (showCumP) {
      const pct = items[i - 1].cumulativePercent;
      svgContent += `<text x="${p.x}" y="${p.y - 10}" text-anchor="middle" fill="${lineColor}" font-size="10" font-family="JetBrains Mono" font-weight="500" pointer-events="none">${pct.toFixed(1)}%</text>`;
    }
  });

  // Left Y axis
  svgContent += `<line x1="0" y1="0" x2="0" y2="${ch}" stroke="#8b8fa4" stroke-width="1"/>`;
  const leftTicks = niceTicksForMax(maxVal);
  for (const t of leftTicks) {
    const y = ch - (t / maxVal) * ch;
    svgContent += `<line x1="-5" y1="${y}" x2="0" y2="${y}" stroke="#8b8fa4" stroke-width="1"/>`;
    svgContent += `<text x="-10" y="${y + 4}" text-anchor="end" fill="#8b8fa4" font-size="10" font-family="JetBrains Mono">${formatNum(t)}</text>`;
  }
  // 0
  svgContent += `<text x="-10" y="${ch + 4}" text-anchor="end" fill="#8b8fa4" font-size="10" font-family="JetBrains Mono">0</text>`;

  // Right Y axis (0%-100%)
  svgContent += `<line x1="${cw}" y1="0" x2="${cw}" y2="${ch}" stroke="#8b8fa4" stroke-width="1"/>`;
  for (let p = 0; p <= 100; p += 20) {
    const y = ch - (p / 100) * ch;
    svgContent += `<line x1="${cw}" y1="${y}" x2="${cw + 5}" y2="${y}" stroke="#8b8fa4" stroke-width="1"/>`;
    svgContent += `<text x="${cw + 10}" y="${y + 4}" text-anchor="start" fill="#8b8fa4" font-size="10" font-family="JetBrains Mono">${p}%</text>`;
  }

  // Bottom axis
  svgContent += `<line x1="0" y1="${ch}" x2="${cw}" y2="${ch}" stroke="#8b8fa4" stroke-width="1"/>`;

  // Y-axis labels
  if (yLabelL) {
    svgContent += `<text x="${-margin.left + 14}" y="${ch / 2}" text-anchor="middle" fill="#8b8fa4" font-size="12" font-family="Noto Sans JP" transform="rotate(-90, ${-margin.left + 14}, ${ch / 2})">${escSvg(yLabelL)}</text>`;
  }
  svgContent += `<text x="${cw + margin.right - 10}" y="${ch / 2}" text-anchor="middle" fill="#8b8fa4" font-size="12" font-family="Noto Sans JP" transform="rotate(90, ${cw + margin.right - 10}, ${ch / 2})">累積比率 (%)</text>`;

  // X-axis label
  if (xLabelText) {
    svgContent += `<text x="${cw / 2}" y="${ch + 50}" text-anchor="middle" fill="#8b8fa4" font-size="12" font-family="Noto Sans JP">${escSvg(xLabelText)}</text>`;
  }

  svgContent += '</g>';

  // Title
  if (titleText) {
    svgContent += `<text x="${W / 2}" y="28" text-anchor="middle" fill="#e4e6f0" font-size="16" font-weight="600" font-family="Noto Sans JP">${escSvg(titleText)}</text>`;
  }

  svg.innerHTML = svgContent;

  // Interactive hover
  setupInteraction(items, barW, barGap, margin, ch, maxVal, total);

  // Stats
  renderStats(items, total);
}

function setupInteraction(items, barW, barGap, margin, ch, maxVal, total) {
  const svg = document.getElementById('paretoSvg');
  const tooltip = document.getElementById('tooltip');

  svg.querySelectorAll('.bar-rect').forEach(rect => {
    rect.addEventListener('mouseenter', (e) => {
      const idx = parseInt(rect.getAttribute('data-index'));
      const item = items[idx];
      rect.setAttribute('opacity', '1');
      
      tooltip.innerHTML = `
        <div class="tt-label">${escHtml(item.name)}</div>
        <div class="tt-row">値: <span>${formatNum(item.value)}</span></div>
        <div class="tt-row">構成比: <span>${item.percentage.toFixed(1)}%</span></div>
        <div class="tt-row">累積: <span>${item.cumulativePercent.toFixed(1)}%</span></div>
        <div class="tt-row">順位: <span>${idx + 1} / ${items.length}</span></div>
      `;
      tooltip.classList.add('show');
    });

    rect.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });

    rect.addEventListener('mouseleave', () => {
      rect.setAttribute('opacity', '0.85');
      tooltip.classList.remove('show');
    });
  });

  svg.querySelectorAll('[data-cum-index]').forEach(circle => {
    circle.addEventListener('mouseenter', (e) => {
      const idx = parseInt(circle.getAttribute('data-cum-index'));
      const item = items[idx];
      circle.setAttribute('r', '6');

      tooltip.innerHTML = `
        <div class="tt-label">${escHtml(item.name)}</div>
        <div class="tt-row">累積値: <span>${formatNum(item.cumulative)}</span></div>
        <div class="tt-row">累積比率: <span>${item.cumulativePercent.toFixed(1)}%</span></div>
      `;
      tooltip.classList.add('show');
    });

    circle.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });

    circle.addEventListener('mouseleave', () => {
      circle.setAttribute('r', '4.5');
      tooltip.classList.remove('show');
    });
  });
}

function renderStats(items, total) {
  const bar = document.getElementById('statsBar');
  // Find 80% items
  let count80 = 0;
  for (const item of items) {
    count80++;
    if (item.cumulativePercent >= 80) break;
  }
  const topItem = items[0];

  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">合計</div>
      <div class="stat-value">${formatNum(total)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">項目数</div>
      <div class="stat-value">${items.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最大項目</div>
      <div class="stat-value">${topItem ? escHtml(topItem.name) : '-'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">80%到達</div>
      <div class="stat-value">${count80}項目</div>
    </div>
  `;
}

// ============================
// Utility
// ============================
function niceMax(val) {
  if (val <= 0) return 10;
  const mag = Math.pow(10, Math.floor(Math.log10(val)));
  const norm = val / mag;
  let nice;
  if (norm <= 1) nice = 1;
  else if (norm <= 1.5) nice = 1.5;
  else if (norm <= 2) nice = 2;
  else if (norm <= 2.5) nice = 2.5;
  else if (norm <= 3) nice = 3;
  else if (norm <= 4) nice = 4;
  else if (norm <= 5) nice = 5;
  else if (norm <= 7.5) nice = 7.5;
  else nice = 10;
  return nice * mag;
}

function niceTicksForMax(max) {
  if (max <= 0) return [0];
  // Aim for ~4-6 tick marks between 0 and max
  const targetTicks = 5;
  const rawStep = max / targetTicks;
  // Round step to a nice number
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  let niceStep;
  if (norm <= 1) niceStep = 1;
  else if (norm <= 2) niceStep = 2;
  else if (norm <= 2.5) niceStep = 2.5;
  else if (norm <= 5) niceStep = 5;
  else niceStep = 10;
  const step = niceStep * mag;

  const ticks = [];
  for (let t = step; t < max; t += step) {
    ticks.push(Math.round(t * 1e6) / 1e6); // avoid float drift
  }
  // Always include max (total) itself as the top tick
  ticks.push(max);
  return ticks;
}

function formatNum(v) {
  if (Number.isInteger(v)) return v.toLocaleString();
  return v.toLocaleString(undefined, { maximumFractionDigits: 2 });
}

function escSvg(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================
// Export
// ============================
function exportSVG() {
  const svg = document.getElementById('paretoSvg');
  const svgData = new XMLSerializer().serializeToString(svg);
  const fullSvg = `<?xml version="1.0" encoding="UTF-8"?>\n${svgData}`;
  const blob = new Blob([fullSvg], { type: 'image/svg+xml' });
  downloadBlob(blob, 'pareto_chart.svg');
}

function exportPNG() {
  const svg = document.getElementById('paretoSvg');
  const svgData = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  const scale = 2;
  canvas.width = 820 * scale;
  canvas.height = 460 * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1d27';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  const img = new Image();
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(blob => {
      downloadBlob(blob, 'pareto_chart.png');
    });
  };
  img.src = url;
}

function exportCSV() {
  const result = computeParetoData();
  if (!result) { alert('データがありません。'); return; }
  let csv = '\uFEFF項目名,値,構成比(%),累積値,累積比率(%)\n';
  result.items.forEach(item => {
    csv += `${item.name},${item.value},${item.percentage.toFixed(2)},${item.cumulative},${item.cumulativePercent.toFixed(2)}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, 'pareto_data.csv');
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') renderChart();
});

// ============================
// Init
// ============================
loadSample();
